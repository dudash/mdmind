name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version
        shell: bash
        run: |
          manifest_version="$(grep '^version = "' Cargo.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "${manifest_version}" != "${tag_version}" ]]; then
            echo "Cargo.toml version ${manifest_version} does not match tag ${tag_version}"
            exit 1
          fi

  build-release:
    name: Build ${{ matrix.target }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --locked --release --target ${{ matrix.target }} --bin mdm --bin mdmind

      - name: Package unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact="mdmind-${GITHUB_REF_NAME}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          staging="mdmind-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "${staging}"
          mkdir -p "${staging}/examples"
          cp "target/${{ matrix.target }}/release/mdm" "${staging}/"
          cp "target/${{ matrix.target }}/release/mdmind" "${staging}/"
          cp README.md "${staging}/"
          cp examples/*.md "${staging}/examples/"
          tar -czf "${artifact}" "${staging}"
          echo "ASSET=${artifact}" >> "${GITHUB_ENV}"

      - name: Package windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "mdmind-$env:GITHUB_REF_NAME-${{ matrix.target }}.${{ matrix.archive_ext }}"
          $staging = "mdmind-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          New-Item -ItemType Directory -Path "$staging/examples" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mdm.exe" "$staging/"
          Copy-Item "target/${{ matrix.target }}/release/mdmind.exe" "$staging/"
          Copy-Item "README.md" "$staging/"
          Copy-Item "examples/*.md" "$staging/examples/"
          Compress-Archive -Path "$staging/*" -DestinationPath $artifact
          "ASSET=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

  install-metadata:
    name: Generate install metadata
    needs: build-release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ github.ref_name }}
      VERSION: ${{ github.ref_name }}
      REPOSITORY: ${{ github.repository }}
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Normalize version
        shell: bash
        run: echo "VERSION=${VERSION#v}" >> "${GITHUB_ENV}"

      - name: Download release archives
        shell: bash
        run: |
          gh release download "${TAG_NAME}" \
            --pattern "mdmind-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            --pattern "mdmind-${TAG_NAME}-x86_64-apple-darwin.tar.gz" \
            --pattern "mdmind-${TAG_NAME}-aarch64-apple-darwin.tar.gz" \
            --pattern "mdmind-${TAG_NAME}-x86_64-pc-windows-msvc.zip"

      - name: Build checksum manifest
        shell: bash
        run: |
          sha256sum \
            "mdmind-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            "mdmind-${TAG_NAME}-x86_64-apple-darwin.tar.gz" \
            "mdmind-${TAG_NAME}-aarch64-apple-darwin.tar.gz" \
            "mdmind-${TAG_NAME}-x86_64-pc-windows-msvc.zip" \
            > "mdmind-${TAG_NAME}-checksums.txt"

      - name: Render Homebrew formula
        shell: bash
        run: |
          linux_sha="$(awk '/x86_64-unknown-linux-gnu/ {print $1}' "mdmind-${TAG_NAME}-checksums.txt")"
          darwin_amd64_sha="$(awk '/x86_64-apple-darwin/ {print $1}' "mdmind-${TAG_NAME}-checksums.txt")"
          darwin_arm64_sha="$(awk '/aarch64-apple-darwin/ {print $1}' "mdmind-${TAG_NAME}-checksums.txt")"
          bash scripts/render-homebrew-formula.sh \
            --version "${VERSION}" \
            --repo "${REPOSITORY}" \
            --darwin-amd64-sha "${darwin_amd64_sha}" \
            --darwin-arm64-sha "${darwin_arm64_sha}" \
            --linux-amd64-sha "${linux_sha}" \
            > mdmind.rb

      - name: Upload install metadata to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mdmind.rb
            mdmind-${{ github.ref_name }}-checksums.txt

      - name: Publish Homebrew tap
        if: ${{ env.HOMEBREW_TAP_REPO != '' && env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPO }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit updated formula to tap
        if: ${{ env.HOMEBREW_TAP_REPO != '' && env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          mkdir -p tap/Formula
          cp mdmind.rb tap/Formula/mdmind.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mdmind.rb
          if git diff --cached --quiet -- Formula/mdmind.rb; then
            echo "Homebrew formula already up to date"
            exit 0
          fi
          git commit -m "mdmind ${TAG_NAME}"
          git push
