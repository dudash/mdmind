name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release, without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release commit and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
    steps:
      - name: Set release metadata
        id: release_meta
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release branch
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Prepare Release must run from the main branch. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Validate version input
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Version must look like semver, for example 0.2.0 or 0.2.0-rc.1"
            exit 1
          fi

      - name: Ensure tag does not already exist
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git show-ref --verify --quiet "refs/tags/v${VERSION}"; then
            echo "Tag v${VERSION} already exists"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Update crate version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          perl -0pi -e 's/^version = "[^"]+"/version = "'"${VERSION}"'"/m' Cargo.toml
          perl -0pi -e 's/name = "mdmind"\nversion = "[^"]+"/name = "mdmind"\nversion = "'"${VERSION}"'"/s' Cargo.lock

      - name: Verify version update
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cargo run --bin mdm -- version | tee /tmp/mdm-version.txt
          grep -qx "mdm ${VERSION}" /tmp/mdm-version.txt

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Commit release prep
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): prepare v${VERSION}"

      - name: Create tag
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: git tag "v${VERSION}"

      - name: Push commit and tag
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git push origin HEAD:main
          git push origin "v${VERSION}"

  create-release:
    name: Create GitHub release
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Create release entry
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: ${{ needs.prepare-release.outputs.tag_name }}
          generate_release_notes: true

  build-release:
    name: Build ${{ matrix.target }}
    needs:
      - prepare-release
      - create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --locked --release --target ${{ matrix.target }} --bin mdm --bin mdmind

      - name: Package unix archive
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          artifact="mdmind-${TAG_NAME}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          staging="mdmind-${TAG_NAME}-${{ matrix.target }}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/mdm" "${staging}/"
          cp "target/${{ matrix.target }}/release/mdmind" "${staging}/"
          cp README.md "${staging}/"
          tar -czf "${artifact}" "${staging}"
          echo "ASSET=${artifact}" >> "${GITHUB_ENV}"

      - name: Package windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          $artifact = "mdmind-$env:TAG_NAME-${{ matrix.target }}.${{ matrix.archive_ext }}"
          $staging = "mdmind-$env:TAG_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mdm.exe" "$staging/"
          Copy-Item "target/${{ matrix.target }}/release/mdmind.exe" "$staging/"
          Copy-Item "README.md" "$staging/"
          Compress-Archive -Path "$staging/*" -DestinationPath $artifact
          "ASSET=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: ${{ env.ASSET }}
